<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wall Grid - クライミング課題作成ツール</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  overflow-x: hidden;
}

header {
  background: #16213e;
  padding: 12px 16px;
  text-align: center;
  border-bottom: 2px solid #0f3460;
}
header h1 { font-size: 1.2rem; color: #e94560; }
header p { font-size: 0.75rem; color: #888; margin-top: 2px; }

.container { max-width: 600px; margin: 0 auto; padding: 12px; }

/* ステップインジケーター */
.steps {
  display: flex; gap: 4px; margin-bottom: 16px;
}
.steps .step {
  flex: 1; height: 4px; background: #333; border-radius: 2px;
  transition: background 0.3s;
}
.steps .step.active { background: #e94560; }
.steps .step.done { background: #4ecca3; }

/* セクション */
.section { display: none; }
.section.active { display: block; }

.section-title {
  font-size: 1rem; font-weight: bold; margin-bottom: 12px;
  padding-left: 8px; border-left: 3px solid #e94560;
}

/* ボタン */
.btn {
  display: block; width: 100%; padding: 14px;
  border: none; border-radius: 8px; font-size: 1rem;
  font-weight: bold; cursor: pointer; margin-top: 12px;
  transition: opacity 0.2s;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: #e94560; color: #fff; }
.btn-secondary { background: #333; color: #eee; }
.btn-success { background: #4ecca3; color: #1a1a2e; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 写真アップロード */
.upload-area {
  border: 2px dashed #555; border-radius: 12px;
  padding: 40px 20px; text-align: center; cursor: pointer;
  transition: border-color 0.3s;
}
.upload-area:hover { border-color: #e94560; }
.upload-area .icon { font-size: 2.5rem; margin-bottom: 8px; }
.upload-area p { color: #888; font-size: 0.9rem; }
#fileInput { display: none; }

/* キャンバスエリア */
.canvas-wrapper {
  position: relative; width: 100%;
  background: #111; border-radius: 8px; overflow: hidden;
  touch-action: none;
}
.canvas-wrapper canvas {
  display: block; width: 100%; height: auto;
}

.instruction {
  background: #16213e; padding: 10px 14px; border-radius: 8px;
  font-size: 0.85rem; color: #aaa; margin-bottom: 12px;
  line-height: 1.5;
}
.instruction strong { color: #e94560; }

/* 入力フォーム */
.form-group {
  margin-bottom: 14px;
}
.form-group label {
  display: block; font-size: 0.85rem; color: #aaa;
  margin-bottom: 4px;
}
.form-group input, .form-group select {
  width: 100%; padding: 10px 12px;
  background: #16213e; border: 1px solid #333;
  border-radius: 6px; color: #eee; font-size: 1rem;
}
.form-group input:focus, .form-group select:focus {
  outline: none; border-color: #e94560;
}
.form-row {
  display: flex; gap: 12px;
}
.form-row .form-group { flex: 1; }

/* 角度入力エリア */
.angle-list { margin-top: 8px; }
.angle-item {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; background: #16213e;
  padding: 8px 12px; border-radius: 6px;
}
.angle-item input { flex: 1; }
.angle-item .remove-angle {
  background: none; border: none; color: #e94560;
  font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
}

/* グリッド設定 */
.grid-settings {
  display: flex; gap: 12px; margin-bottom: 12px;
  align-items: center;
}
.grid-settings label { font-size: 0.85rem; color: #aaa; white-space: nowrap; }
.grid-settings input {
  width: 60px; padding: 6px 8px;
  background: #16213e; border: 1px solid #333;
  border-radius: 6px; color: #eee; font-size: 0.9rem;
  text-align: center;
}

/* プレビュー情報 */
.info-overlay {
  background: rgba(0,0,0,0.85); padding: 12px;
  border-radius: 8px; margin-top: 12px; font-size: 0.8rem;
  line-height: 1.6;
}
.info-overlay .label { color: #888; }
.info-overlay .value { color: #4ecca3; font-weight: bold; }

/* コピーテキスト */
.copy-area {
  background: #16213e; border-radius: 8px; padding: 12px;
  margin-top: 12px; font-size: 0.8rem; line-height: 1.6;
  white-space: pre-wrap; word-break: break-all;
  max-height: 200px; overflow-y: auto;
}

/* 描画ツールバー */
.draw-toolbar {
  background: #16213e; border-radius: 8px; padding: 8px 10px;
  margin-bottom: 8px;
}
.tool-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px;
}
.tool-row:last-child { margin-bottom: 0; }
.tool-btn {
  width: 40px; height: 40px; border: 2px solid #333;
  border-radius: 8px; background: #1a1a2e; font-size: 1.1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #eee;
}
.tool-btn.active { border-color: #e94560; background: #2a1a3e; }
.color-btn {
  width: 28px; height: 28px; border: 2px solid #555;
  border-radius: 50%; cursor: pointer; padding: 0;
}
.color-btn.active { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.5); }

/* 描画モードトグル */
.draw-mode-toggle {
  display: flex; align-items: center; gap: 8px;
  background: #16213e; border-radius: 8px; padding: 10px 14px;
  margin-bottom: 8px;
}
.draw-mode-toggle .toggle-switch {
  position: relative; width: 52px; height: 28px;
  background: #333; border-radius: 14px; cursor: pointer;
  transition: background 0.3s; flex-shrink: 0;
}
.draw-mode-toggle .toggle-switch.on { background: #e94560; }
.draw-mode-toggle .toggle-switch .knob {
  position: absolute; top: 3px; left: 3px;
  width: 22px; height: 22px; background: #fff;
  border-radius: 50%; transition: left 0.3s;
}
.draw-mode-toggle .toggle-switch.on .knob { left: 27px; }
.draw-mode-label { font-size: 0.85rem; }
.draw-mode-hint { font-size: 0.7rem; color: #666; }

/* ズームコントロール */
.zoom-controls {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.zoom-btn {
  width: 40px; height: 40px; border: 1px solid #444;
  border-radius: 8px; background: #16213e; color: #eee;
  font-size: 1.2rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.zoom-btn:active { background: #2a2a4e; }
.zoom-level { font-size: 0.85rem; color: #aaa; min-width: 50px; text-align: center; }

/* ズーム可能キャンバスコンテナ */
.draw-scroll-container {
  overflow: auto; max-height: 70vh;
  border: 2px solid #333; border-radius: 8px;
  background: #111; -webkit-overflow-scrolling: touch;
}
.draw-scroll-container.draw-active { border-color: #e94560; }
.draw-inner {
  transform-origin: 0 0; position: relative;
}

.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #4ecca3; color: #1a1a2e; padding: 10px 24px;
  border-radius: 20px; font-size: 0.9rem; font-weight: bold;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>Wall Grid</h1>
  <p>クライミング課題作成支援ツール</p>
</header>

<div class="container">
  <div class="steps">
    <div class="step active" data-step="0"></div>
    <div class="step" data-step="1"></div>
    <div class="step" data-step="2"></div>
    <div class="step" data-step="3"></div>
    <div class="step" data-step="4"></div>
  </div>

  <!-- Step 0: 写真アップロード -->
  <div class="section active" id="step0">
    <p class="section-title">Step 1: 壁の写真</p>
    <div class="upload-area" id="uploadArea">
      <div class="icon">📷</div>
      <p>タップして写真を撮影/選択</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    <button class="btn btn-primary" id="toStep1" disabled>次へ: 壁の範囲を指定</button>
  </div>

  <!-- Step 1: 壁の範囲指定 -->
  <div class="section" id="step1">
    <p class="section-title">Step 2: 壁の範囲を指定</p>
    <div class="instruction">
      壁の<strong>左上</strong>と<strong>右下</strong>をタップしてください。<br>
      壁だけを囲むように2点をタップします。
    </div>
    <div class="canvas-wrapper">
      <canvas id="wallCanvas"></canvas>
    </div>
    <button class="btn btn-secondary" id="resetCorners">タップをやり直す</button>
    <button class="btn btn-primary" id="toStep2" disabled>次へ: 壁の情報を入力</button>
    <button class="btn btn-secondary" id="backTo0" style="margin-top:8px">戻る</button>
  </div>

  <!-- Step 2: 壁情報入力 -->
  <div class="section" id="step2">
    <p class="section-title">Step 3: 壁とクライマーの情報</p>

    <p style="font-size:0.9rem; color:#ccc; margin-bottom:12px;">壁の情報</p>
    <div class="form-row">
      <div class="form-group">
        <label>壁の幅 (m)</label>
        <input type="number" id="wallWidth" step="0.1" placeholder="例: 4.0">
      </div>
      <div class="form-group">
        <label>壁の高さ (m)</label>
        <input type="number" id="wallHeight" step="0.1" placeholder="例: 3.5">
      </div>
    </div>

    <div class="form-group">
      <label>壁の傾斜（複数可）</label>
      <div class="angle-list" id="angleList">
        <div class="angle-item">
          <input type="number" placeholder="例: 100" min="0" max="180"> <span style="color:#888">度</span>
          <span style="font-size:0.75rem;color:#666">（90=垂壁）</span>
        </div>
      </div>
      <button class="btn btn-secondary" id="addAngle" style="padding:8px;font-size:0.85rem;margin-top:4px">+ 傾斜を追加</button>
    </div>

    <hr style="border-color:#333;margin:16px 0">
    <p style="font-size:0.9rem; color:#ccc; margin-bottom:12px;">クライマーの情報</p>

    <div class="form-row">
      <div class="form-group">
        <label>身長 (cm)</label>
        <input type="number" id="climberHeight" step="0.5" placeholder="例: 178.5">
      </div>
      <div class="form-group">
        <label>リーチ (cm)</label>
        <input type="number" id="climberReach" step="0.5" placeholder="例: 174">
      </div>
    </div>
    <div class="form-group">
      <label>希望グレード</label>
      <select id="grade">
        <option value="">選択してください</option>
        <option value="10Q">10級</option><option value="9Q">9級</option>
        <option value="8Q">8級</option><option value="7Q">7級</option>
        <option value="6Q">6級</option><option value="5Q">5級</option>
        <option value="4Q">4級</option><option value="3Q">3級</option>
        <option value="2Q">2級</option><option value="1Q">1級</option>
        <option value="1D">初段</option><option value="2D">二段</option>
        <option value="3D">三段</option><option value="4D">四段</option>
      </select>
    </div>

    <div class="form-group">
      <label>グリッド列数 × 行数</label>
      <div class="grid-settings">
        <label>列</label>
        <input type="number" id="gridCols" value="8" min="3" max="16">
        <label>行</label>
        <input type="number" id="gridRows" value="8" min="3" max="16">
      </div>
    </div>

    <button class="btn btn-success" id="toStep3">グリッド画像を生成</button>
    <button class="btn btn-secondary" id="backTo1" style="margin-top:8px">戻る</button>
  </div>

  <!-- Step 3: 結果 -->
  <div class="section" id="step3">
    <p class="section-title">Step 4: グリッド画像</p>
    <div class="canvas-wrapper">
      <canvas id="resultCanvas"></canvas>
    </div>
    <div class="info-overlay" id="infoOverlay"></div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-success" id="downloadBtn" style="flex:1;margin-top:0">📥 画像を保存</button>
      <button class="btn btn-success" id="shareBtn" style="flex:1;margin-top:0;background:#3b82f6">📤 共有</button>
    </div>

    <p style="font-size:0.85rem;color:#aaa;margin:16px 0 8px;border-left:3px solid #4ecca3;padding-left:8px">AIで課題を作る</p>
    <button class="btn btn-primary" id="copyPrompt">📋 AIプロンプトをコピー</button>
    <p style="font-size:0.75rem;color:#666;margin-top:6px;text-align:center">コピーしたプロンプトと画像をAIに貼り付けてください<br><span style="color:#4ecca3">※Gemini推奨（座標認識の精度が高い）</span></p>
    <div class="copy-area" id="promptArea" style="display:none"></div>

    <button class="btn btn-success" id="toStep4" style="margin-top:12px;background:#f59e0b;color:#000">✏️ 課題を書き込む</button>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-secondary" id="backTo2" style="flex:1;margin-top:0">戻って修正</button>
      <button class="btn btn-secondary" id="restart" style="flex:1;margin-top:0">最初から</button>
    </div>
  </div>

  <!-- Step 4: 手描き編集 -->
  <div class="section" id="step4">
    <p class="section-title">Step 5: 課題を書き込む</p>
    <!-- 描画ON/OFF -->
    <div class="draw-mode-toggle">
      <div class="toggle-switch" id="drawToggle">
        <div class="knob"></div>
      </div>
      <div>
        <div class="draw-mode-label" id="drawModeLabel">描画OFF（スクロール可能）</div>
        <div class="draw-mode-hint">ONにすると画像に書き込めます</div>
      </div>
    </div>

    <!-- ツールバー（描画ON時のみ表示） -->
    <div class="draw-toolbar" id="drawToolbar" style="display:none">
      <div class="tool-row">
        <button class="tool-btn active" data-tool="circle" title="丸">⭕</button>
        <button class="tool-btn" data-tool="pen" title="ペン">✏️</button>
        <button class="tool-btn" data-tool="line" title="直線">📏</button>
        <button class="tool-btn" data-tool="text" title="テキスト">T</button>
        <button class="tool-btn" data-tool="eraser" title="消しゴム">🗑️</button>
      </div>
      <div class="tool-row">
        <span style="font-size:0.75rem;color:#888">色:</span>
        <button class="color-btn active" data-color="#ff0000" style="background:#ff0000"></button>
        <button class="color-btn" data-color="#00ff00" style="background:#00ff00"></button>
        <button class="color-btn" data-color="#ffff00" style="background:#ffff00"></button>
        <button class="color-btn" data-color="#00ffff" style="background:#00ffff"></button>
        <button class="color-btn" data-color="#ff00ff" style="background:#ff00ff"></button>
        <button class="color-btn" data-color="#ffffff" style="background:#ffffff"></button>
        <span style="font-size:0.75rem;color:#888;margin-left:8px">太さ:</span>
        <input type="range" id="drawSize" min="2" max="12" value="4" style="width:60px;vertical-align:middle">
      </div>
    </div>

    <!-- ズームコントロール -->
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomOut">−</button>
      <span class="zoom-level" id="zoomLevel">100%</span>
      <button class="zoom-btn" id="zoomIn">＋</button>
      <button class="zoom-btn" id="zoomFit" style="font-size:0.75rem;width:auto;padding:0 10px">全体</button>
    </div>

    <!-- スクロール＋ズーム可能なコンテナ -->
    <div class="draw-scroll-container" id="drawScrollContainer">
      <div class="draw-inner" id="drawInner">
        <canvas id="drawCanvas"></canvas>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-secondary" id="undoDraw" style="flex:1;margin-top:0">↩ 戻す</button>
      <button class="btn btn-secondary" id="clearDraw" style="flex:1;margin-top:0">全消去</button>
    </div>

    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-success" id="downloadDraw" style="flex:1;margin-top:0">📥 画像を保存</button>
      <button class="btn btn-success" id="shareDraw" style="flex:1;margin-top:0;background:#3b82f6">📤 共有</button>
    </div>
    <button class="btn btn-secondary" id="backTo3" style="margin-top:8px">戻る</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// State
const state = {
  image: null,
  corners: [],       // [{x,y}, {x,y}] in image coordinates
  wallWidth: null,
  wallHeight: null,
  angles: [],
  climberHeight: null,
  climberReach: null,
  grade: '',
  gridCols: 8,
  gridRows: 8,
};

let currentStep = 0;
const canvas = document.getElementById('wallCanvas');
const ctx = canvas.getContext('2d');
const resultCanvas = document.getElementById('resultCanvas');
const rctx = resultCanvas.getContext('2d');

// ===== Step navigation =====
function goToStep(n) {
  currentStep = n;
  document.querySelectorAll('.section').forEach((s, i) => {
    s.classList.toggle('active', i === n);
  });
  document.querySelectorAll('.steps .step').forEach((s, i) => {
    s.classList.remove('active', 'done');
    if (i < n) s.classList.add('done');
    if (i === n) s.classList.add('active');
  });
  if (n === 1) drawWallCanvas();
  if (n === 3) generateResult();
  if (n === 4) initDrawCanvas();
}

// ===== Step 0: Upload =====
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    state.image = img;
    uploadArea.innerHTML = `<div class="icon">✅</div><p>写真を読み込みました (${img.width}×${img.height})</p>`;
    document.getElementById('toStep1').disabled = false;
  };
  img.src = URL.createObjectURL(file);
});

document.getElementById('toStep1').addEventListener('click', () => goToStep(1));

// ===== Step 1: Corner selection =====
function drawWallCanvas() {
  if (!state.image) return;
  const img = state.image;
  const ratio = img.width / img.height;
  const w = canvas.parentElement.clientWidth;
  const h = w / ratio;
  canvas.width = w;
  canvas.height = h;
  canvas.dataset.scale = w / img.width;
  ctx.drawImage(img, 0, 0, w, h);

  // Draw corners
  const scale = parseFloat(canvas.dataset.scale);
  state.corners.forEach((c, i) => {
    const sx = c.x * scale;
    const sy = c.y * scale;
    ctx.beginPath();
    ctx.arc(sx, sy, 10, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? '#e94560' : '#4ecca3';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(i === 0 ? '左上' : '右下', sx, sy - 14);
  });

  // Draw rectangle
  if (state.corners.length === 2) {
    const c0 = state.corners[0];
    const c1 = state.corners[1];
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(c0.x * scale, c0.y * scale, (c1.x - c0.x) * scale, (c1.y - c0.y) * scale);
    ctx.setLineDash([]);
    document.getElementById('toStep2').disabled = false;
  } else {
    document.getElementById('toStep2').disabled = true;
  }
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scale = parseFloat(canvas.dataset.scale);
  const x = (e.clientX - rect.left) / scale;
  const y = (e.clientY - rect.top) / scale;

  if (state.corners.length < 2) {
    state.corners.push({ x, y });
  } else {
    // Replace closest corner
    const d0 = Math.hypot(x - state.corners[0].x, y - state.corners[0].y);
    const d1 = Math.hypot(x - state.corners[1].x, y - state.corners[1].y);
    if (d0 < d1) state.corners[0] = { x, y };
    else state.corners[1] = { x, y };
  }
  // Ensure corner order (top-left, bottom-right)
  if (state.corners.length === 2) {
    const [a, b] = state.corners;
    state.corners = [
      { x: Math.min(a.x, b.x), y: Math.min(a.y, b.y) },
      { x: Math.max(a.x, b.x), y: Math.max(a.y, b.y) },
    ];
  }
  drawWallCanvas();
});

document.getElementById('resetCorners').addEventListener('click', () => {
  state.corners = [];
  drawWallCanvas();
});

document.getElementById('toStep2').addEventListener('click', () => goToStep(2));
document.getElementById('backTo0').addEventListener('click', () => goToStep(0));

// ===== Step 2: Info input =====
document.getElementById('addAngle').addEventListener('click', () => {
  const list = document.getElementById('angleList');
  const item = document.createElement('div');
  item.className = 'angle-item';
  item.innerHTML = `<input type="number" placeholder="例: 120" min="0" max="180"> <span style="color:#888">度</span>
    <button class="remove-angle" onclick="this.parentElement.remove()">×</button>`;
  list.appendChild(item);
});

document.getElementById('toStep3').addEventListener('click', () => {

// ===== Step 3: Generate result =====
function generateResult() {
  const img = state.image;
  const [c0, c1] = state.corners;
  const cols = state.gridCols;
  const rows = state.gridRows;

  // Legend width
  const legendW = 300;
  const totalW = img.width + legendW;
  const totalH = img.height;

  resultCanvas.width = totalW;
  resultCanvas.height = totalH;

  // Draw image
  rctx.drawImage(img, 0, 0);

  // Wall area
  const wx = c0.x, wy = c0.y;
  const ww = c1.x - c0.x, wh = c1.y - c0.y;
  const cellW = ww / cols, cellH = wh / rows;

  // Grid lines - thickness scales with image size
  const colLabels = 'ABCDEFGHIJKLMNOP'.slice(0, cols);
  const gridLineWidth = Math.max(2, Math.round(img.width / 500));

  rctx.strokeStyle = 'rgba(255,255,0,0.8)';
  rctx.lineWidth = gridLineWidth;

  // Draw grid lines
  for (let c = 0; c <= cols; c++) {
    const x = wx + c * cellW;
    rctx.beginPath(); rctx.moveTo(x, wy); rctx.lineTo(x, wy + wh); rctx.stroke();
  }
  for (let r = 0; r <= rows; r++) {
    const y = wy + r * cellH;
    rctx.beginPath(); rctx.moveTo(wx, y); rctx.lineTo(wx + ww, y); rctx.stroke();
  }

  // Draw labels INSIDE each cell (e.g. "A1", "B3")
  // Font size scales with cell size (readable even on 4000px+ images)
  const labelFontSize = Math.max(14, Math.round(Math.min(cellW, cellH) / 3));
  rctx.font = `bold ${labelFontSize}px sans-serif`;
  rctx.textAlign = 'center';
  rctx.textBaseline = 'middle';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cx = wx + c * cellW + cellW / 2;
      const cy = wy + r * cellH + cellH / 2;
      const label = colLabels[c] + (r + 1);
      const tw = rctx.measureText(label).width;
      const pad = Math.max(4, Math.round(labelFontSize / 5));
      // Background
      rctx.fillStyle = 'rgba(0,0,0,0.6)';
      rctx.fillRect(cx - tw/2 - pad, cy - labelFontSize/2 - pad/2, tw + pad*2, labelFontSize + pad);
      // Text
      rctx.fillStyle = 'rgba(255,255,0,0.9)';
      rctx.fillText(label, cx, cy);
    }
  }
  rctx.textBaseline = 'alphabetic';

  // Wall border
  rctx.strokeStyle = '#e94560';
  rctx.lineWidth = Math.max(3, gridLineWidth * 2);
  rctx.strokeRect(wx, wy, ww, wh);

  // Legend area
  rctx.fillStyle = '#1a1a2e';
  rctx.fillRect(img.width, 0, legendW, totalH);

  const lx = img.width + 16;
  let ly = 30;
  const lFontL = Math.max(18, Math.round(totalH / 45));
  const lFontS = Math.max(13, Math.round(totalH / 60));

  rctx.textAlign = 'left';

  // Title
  rctx.font = `bold ${lFontL}px sans-serif`;
  rctx.fillStyle = '#e94560';
  rctx.fillText('Wall Grid', lx, ly); ly += lFontL + 8;

  rctx.font = `${lFontS}px sans-serif`;
  rctx.fillStyle = '#888';

  // Grid info
  rctx.fillText(`グリッド: ${cols}列(A-${colLabels[cols-1]}) × ${rows}行`, lx, ly);
  ly += lFontS + 6;

  // Wall info
  if (state.wallWidth && state.wallHeight) {
    rctx.fillText(`壁サイズ: ${state.wallWidth}m × ${state.wallHeight}m`, lx, ly);
    ly += lFontS + 4;
    const cw = (state.wallWidth / cols).toFixed(2);
    const ch = (state.wallHeight / rows).toFixed(2);
    rctx.fillText(`1マス: 約${cw}m × ${ch}m`, lx, ly);
    ly += lFontS + 6;
  }

  if (state.angles.length > 0) {
    const angStr = state.angles.map(a => `${a}度`).join(', ');
    rctx.fillText(`傾斜: ${angStr}`, lx, ly);
    ly += lFontS + 6;
  }

  // Separator
  ly += 4;
  rctx.strokeStyle = '#333'; rctx.lineWidth = 1;
  rctx.beginPath(); rctx.moveTo(lx, ly); rctx.lineTo(lx + legendW - 32, ly); rctx.stroke();
  ly += 12;

  // Climber info
  rctx.fillStyle = '#4ecca3';
  rctx.font = `bold ${lFontS}px sans-serif`;
  rctx.fillText('クライマー情報', lx, ly); ly += lFontS + 6;
  rctx.fillStyle = '#ccc';
  rctx.font = `${lFontS}px sans-serif`;
  if (state.climberHeight) {
    rctx.fillText(`身長: ${state.climberHeight}cm`, lx, ly); ly += lFontS + 4;
  }
  if (state.climberReach) {
    rctx.fillText(`リーチ: ${state.climberReach}cm`, lx, ly); ly += lFontS + 4;
  }
  if (state.grade) {
    rctx.fillText(`希望グレード: ${state.grade}`, lx, ly); ly += lFontS + 4;
  }

  // Separator
  ly += 8;
  rctx.strokeStyle = '#333'; rctx.lineWidth = 1;
  rctx.beginPath(); rctx.moveTo(lx, ly); rctx.lineTo(lx + legendW - 32, ly); rctx.stroke();
  ly += 12;

  // Usage instruction
  rctx.fillStyle = '#888';
  rctx.font = `${Math.max(11, lFontS - 2)}px sans-serif`;
  const usageLines = [
    '使い方:',
    'この画像をAI(Claude/ChatGPT)に',
    '送り、マスと色でホールドを指定',
    'して課題を作ってもらう。',
    '',
    '例: 「F8の緑ボリュームを',
    'スタートに、3Qの課題を',
    '作ってください」',
  ];
  usageLines.forEach(line => {
    rctx.fillText(line, lx, ly);
    ly += lFontS + 2;
  });

  // Info overlay
  const infoEl = document.getElementById('infoOverlay');
  let infoHTML = '';
  if (state.wallWidth && state.wallHeight) {
    const cw = (state.wallWidth / cols).toFixed(2);
    const ch = (state.wallHeight / rows).toFixed(2);
    infoHTML += `<span class="label">1マスのサイズ:</span> <span class="value">約${cw}m × ${ch}m</span><br>`;
  }
  if (state.climberReach && state.wallWidth) {
    const reachInCells = (state.climberReach / 100 / (state.wallWidth / cols)).toFixed(1);
    infoHTML += `<span class="label">リーチ${state.climberReach}cm =</span> <span class="value">約${reachInCells}マス分</span><br>`;
  }
  if (state.angles.length > 0) {
    infoHTML += `<span class="label">傾斜:</span> <span class="value">${state.angles.map(a => a + '度').join(', ')}</span>`;
  }
  infoEl.innerHTML = infoHTML || '<span class="label">壁情報が未入力です</span>';
}

// ===== Step 4: Draw on grid =====
const drawCanvas = document.getElementById('drawCanvas');
const dctx = drawCanvas.getContext('2d');
let drawTool = 'circle';
let drawColor = '#ff0000';
let drawSize = 4;
let drawHistory = [];     // snapshots for undo
let isDrawing = false;
let drawStart = null;     // for line/circle start point
let baseImage = null;     // grid image as base
let drawModeOn = false;
let zoomScale = 1;

function initDrawCanvas() {
  const img = state.image;

  drawCanvas.width = img.width;
  drawCanvas.height = img.height;

  // Draw the result canvas content (just the image part, no legend)
  dctx.drawImage(resultCanvas, 0, 0, img.width, img.height, 0, 0, img.width, img.height);

  // Save base
  baseImage = dctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
  drawHistory = [drawCanvas.toDataURL()];

  // Initial display: fit to container width
  drawCanvas.style.width = img.width + 'px';
  drawCanvas.style.height = img.height + 'px';

  // Calculate initial zoom to fit
  const container = document.getElementById('drawScrollContainer');
  const fitScale = container.clientWidth / img.width;
  zoomScale = fitScale;
  applyZoom();

  // Reset draw mode
  drawModeOn = false;
  document.getElementById('drawToggle').classList.remove('on');
  document.getElementById('drawModeLabel').textContent = '描画OFF（スクロール可能）';
  document.getElementById('drawToolbar').style.display = 'none';
  document.getElementById('drawScrollContainer').classList.remove('draw-active');
}

function applyZoom() {
  const inner = document.getElementById('drawInner');
  inner.style.transform = `scale(${zoomScale})`;
  inner.style.width = drawCanvas.width + 'px';
  inner.style.height = drawCanvas.height + 'px';
  // Container needs to know actual size for scrolling
  const container = document.getElementById('drawScrollContainer');
  container.style.maxHeight = '70vh';
  document.getElementById('zoomLevel').textContent = Math.round(zoomScale * 100) + '%';
}

// Draw mode toggle
document.getElementById('drawToggle').addEventListener('click', () => {
  drawModeOn = !drawModeOn;
  const toggle = document.getElementById('drawToggle');
  const label = document.getElementById('drawModeLabel');
  const toolbar = document.getElementById('drawToolbar');
  const container = document.getElementById('drawScrollContainer');
  toggle.classList.toggle('on', drawModeOn);
  if (drawModeOn) {
    label.textContent = '描画ON（書き込み中）';
    toolbar.style.display = 'block';
    container.classList.add('draw-active');
  } else {
    label.textContent = '描画OFF（スクロール可能）';
    toolbar.style.display = 'none';
    container.classList.remove('draw-active');
  }
});

// Zoom controls
document.getElementById('zoomIn').addEventListener('click', () => {
  zoomScale = Math.min(4, zoomScale * 1.3);
  applyZoom();
});
document.getElementById('zoomOut').addEventListener('click', () => {
  zoomScale = Math.max(0.3, zoomScale / 1.3);
  applyZoom();
});
document.getElementById('zoomFit').addEventListener('click', () => {
  const container = document.getElementById('drawScrollContainer');
  zoomScale = container.clientWidth / drawCanvas.width;
  applyZoom();
});

function getDrawPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  const touch = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
  return {
    x: (touch.clientX - rect.left) * scaleX,
    y: (touch.clientY - rect.top) * scaleY,
  };
}

function saveDrawState() {
  if (drawHistory.length > 30) drawHistory.shift();
  drawHistory.push(drawCanvas.toDataURL());
}

// Tool selection
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawTool = btn.dataset.tool;
    if (drawTool === 'text') {
      drawCanvas.style.cursor = 'text';
    } else if (drawTool === 'eraser') {
      drawCanvas.style.cursor = 'crosshair';
    } else {
      drawCanvas.style.cursor = 'crosshair';
    }
  });
});

// Color selection
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawColor = btn.dataset.color;
  });
});

document.getElementById('drawSize').addEventListener('input', (e) => {
  drawSize = parseInt(e.target.value);
});

// Drawing events
function onDrawStart(e) {
  if (!drawModeOn) return; // let scroll happen
  e.preventDefault();
  const pos = getDrawPos(e);
  isDrawing = true;
  drawStart = pos;

  if (drawTool === 'pen' || drawTool === 'eraser') {
    dctx.beginPath();
    dctx.moveTo(pos.x, pos.y);
  }
}

function onDrawMove(e) {
  if (!drawModeOn || !isDrawing) return;
  e.preventDefault();
  const pos = getDrawPos(e);

  if (drawTool === 'pen') {
    dctx.strokeStyle = drawColor;
    dctx.lineWidth = drawSize;
    dctx.lineCap = 'round';
    dctx.lineJoin = 'round';
    dctx.lineTo(pos.x, pos.y);
    dctx.stroke();
  } else if (drawTool === 'eraser') {
    // Restore base image in area
    const r = drawSize * 3;
    const sx = Math.max(0, Math.round(pos.x - r));
    const sy = Math.max(0, Math.round(pos.y - r));
    const sw = Math.min(drawCanvas.width - sx, r * 2);
    const sh = Math.min(drawCanvas.height - sy, r * 2);
    if (baseImage && sw > 0 && sh > 0) {
      // Create temp canvas with base, copy region
      const tmp = document.createElement('canvas');
      tmp.width = drawCanvas.width;
      tmp.height = drawCanvas.height;
      const tctx = tmp.getContext('2d');
      tctx.putImageData(baseImage, 0, 0);
      const region = tctx.getImageData(sx, sy, sw, sh);
      dctx.putImageData(region, sx, sy);
    }
  } else if (drawTool === 'circle' || drawTool === 'line') {
    // Preview: restore last saved state and draw preview
    const lastState = new Image();
    lastState.src = drawHistory[drawHistory.length - 1];
    // Simple approach: we'll draw final on end
  }
}

function onDrawEnd(e) {
  if (!drawModeOn || !isDrawing) return;
  isDrawing = false;

  const pos = e.changedTouches ? getDrawPos(e) :
              (e.type === 'mouseup' ? getDrawPos(e) : drawStart);

  if (drawTool === 'circle') {
    const r = Math.max(15, Math.hypot(pos.x - drawStart.x, pos.y - drawStart.y));
    dctx.beginPath();
    dctx.arc(drawStart.x, drawStart.y, r, 0, Math.PI * 2);
    dctx.strokeStyle = drawColor;
    dctx.lineWidth = drawSize;
    dctx.stroke();
    saveDrawState();
  } else if (drawTool === 'line') {
    dctx.beginPath();
    dctx.moveTo(drawStart.x, drawStart.y);
    dctx.lineTo(pos.x, pos.y);
    dctx.strokeStyle = drawColor;
    dctx.lineWidth = drawSize;
    dctx.lineCap = 'round';
    dctx.stroke();
    saveDrawState();
  } else if (drawTool === 'pen' || drawTool === 'eraser') {
    saveDrawState();
  } else if (drawTool === 'text') {
    const text = prompt('テキストを入力:');
    if (text) {
      const textSize = Math.max(16, drawSize * 5);
      dctx.font = `bold ${textSize}px sans-serif`;
      dctx.fillStyle = drawColor;
      dctx.textAlign = 'center';
      dctx.textBaseline = 'middle';
      // Background
      const tw = dctx.measureText(text).width;
      dctx.fillStyle = 'rgba(0,0,0,0.6)';
      dctx.fillRect(drawStart.x - tw/2 - 4, drawStart.y - textSize/2 - 2, tw + 8, textSize + 4);
      dctx.fillStyle = drawColor;
      dctx.fillText(text, drawStart.x, drawStart.y);
      saveDrawState();
    }
  }
  drawStart = null;
}

drawCanvas.addEventListener('mousedown', onDrawStart);
drawCanvas.addEventListener('mousemove', onDrawMove);
drawCanvas.addEventListener('mouseup', onDrawEnd);
drawCanvas.addEventListener('touchstart', onDrawStart, { passive: false });
drawCanvas.addEventListener('touchmove', onDrawMove, { passive: false });
drawCanvas.addEventListener('touchend', onDrawEnd);

// Undo
document.getElementById('undoDraw').addEventListener('click', () => {
  if (drawHistory.length <= 1) return;
  drawHistory.pop();
  const img = new Image();
  img.onload = () => {
    dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    dctx.drawImage(img, 0, 0);
  };
  img.src = drawHistory[drawHistory.length - 1];
});

// Clear all drawings
document.getElementById('clearDraw').addEventListener('click', () => {
  if (!baseImage) return;
  dctx.putImageData(baseImage, 0, 0);
  drawHistory = [drawCanvas.toDataURL()];
  showToast('書き込みを全消去しました');
});

// Download drawn image
document.getElementById('downloadDraw').addEventListener('click', () => {
  drawCanvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = 'wall-grid-route.png';
    link.href = url;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    showToast('課題画像を保存しました');
  }, 'image/png');
});

// Share drawn image
document.getElementById('shareDraw').addEventListener('click', async () => {
  try {
    const blob = await new Promise(r => drawCanvas.toBlob(r, 'image/png'));
    const file = new File([blob], 'wall-grid-route.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ title: 'Wall Grid 課題', files: [file] });
    } else {
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
      showToast('長押しで画像を保存してください');
    }
  } catch (e) {
    if (e.name !== 'AbortError') showToast('共有に失敗しました');
  }
});

document.getElementById('backTo3').addEventListener('click', () => goToStep(3));

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
